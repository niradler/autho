name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: bun-linux-x64
            artifact: autho-linux-x64
          - os: ubuntu-24.04-arm
            target: bun-linux-arm64
            artifact: autho-linux-arm64
          - os: macos-latest
            target: bun-darwin-arm64
            artifact: autho-darwin-arm64
          - os: macos-13
            target: bun-darwin-x64
            artifact: autho-darwin-x64
          - os: windows-latest
            target: bun-windows-x64
            artifact: autho-windows-x64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Build binary
        run: bun build ./apps/cli/src/index.ts --compile --minify --target=${{ matrix.target }} --outfile=dist/${{ matrix.artifact }}

      - name: Smoke test (Unix)
        if: runner.os != 'Windows'
        run: |
          chmod +x dist/${{ matrix.artifact }}
          dist/${{ matrix.artifact }} help

      - name: Smoke test (Windows)
        if: runner.os == 'Windows'
        run: dist/${{ matrix.artifact }} help

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create checksums
        working-directory: dist
        run: sha256sum autho-* > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/autho-*
            dist/checksums.txt
